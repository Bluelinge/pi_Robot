<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D435i Camera Viewer</title>
  <style>
    :root {
      --bg: #091214;
      --panel: #122328;
      --panel-2: #1f3a40;
      --accent: #ffd166;
      --accent-2: #06d6a0;
      --text: #eef8f8;
      --muted: #93afb3;
      --danger: #ef476f;
      --border: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 209, 102, 0.18), transparent 26%),
        radial-gradient(circle at bottom right, rgba(6, 214, 160, 0.16), transparent 20%),
        linear-gradient(160deg, #071114, #0b1b1e 45%, #112328);
      padding: 24px;
    }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .hero, .panel {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(31, 58, 64, 0.95), rgba(18, 35, 40, 0.96));
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.24);
    }

    .hero {
      padding: 24px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      letter-spacing: 0.16em;
      font-size: 12px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
    }

    .sub {
      margin: 10px 0 0;
      color: var(--muted);
      max-width: 58ch;
    }

    .badge {
      min-width: 180px;
      text-align: center;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 700;
      background: rgba(255, 209, 102, 0.18);
      color: var(--accent);
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
    }

    .multi-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr 1fr;
    }

    .panel {
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 12px;
    }

    img {
      width: 100%;
      border-radius: 16px;
      background: #050d10;
      display: block;
      min-height: 240px;
      object-fit: cover;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .toolbar button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      color: var(--text);
      background: rgba(255, 255, 255, 0.1);
      cursor: pointer;
    }

    .toolbar button.active {
      background: rgba(255, 209, 102, 0.18);
      color: var(--accent);
    }

    .toolbar select {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.1);
    }

    .stats {
      display: grid;
      gap: 12px;
    }

    .stat {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .value {
      font-size: 18px;
      font-weight: 700;
    }

    .error {
      color: var(--danger);
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 860px) {
      .hero { flex-direction: column; align-items: flex-start; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Intel RealSense</p>
        <h1>D435i 实时画面</h1>
        <p class="sub">这个页面只负责查看树莓派连接的 D435i 彩色画面，不依赖 ESP32 串口。</p>
      </div>
      <div id="cameraBadge" class="badge">Camera: checking</div>
    </section>

    <section class="grid">
      <article class="panel">
        <h2>实时视频</h2>
        <div class="toolbar">
          <button class="active" data-mode="color" onclick="setMode('color')">彩色</button>
          <button data-mode="depth" onclick="setMode('depth')">深度伪彩色</button>
          <button data-mode="split" onclick="setMode('split')">同时查看</button>
          <select id="resolutionSelect"></select>
          <select id="fpsSelect"></select>
          <button id="applyConfigBtn" onclick="applyViewerConfig()">应用参数</button>
        </div>
        <div id="singleView">
          <img id="stream" src="/stream.mjpg" alt="D435i live stream" />
        </div>
        <div id="splitView" class="multi-grid" style="display:none;">
          <div>
            <p class="label">彩色</p>
            <img id="colorStream" src="/stream.mjpg" alt="D435i color stream" />
          </div>
          <div>
            <p class="label">深度伪彩色</p>
            <img id="depthStream" src="/stream_depth.mjpg" alt="D435i depth stream" />
          </div>
        </div>
      </article>

      <article class="panel">
        <h2>运行状态</h2>
        <div class="stats">
          <div class="stat">
            <span class="label">状态</span>
            <span id="cameraOk" class="value">checking...</span>
          </div>
          <div class="stat">
            <span class="label">分辨率</span>
            <span id="resolution" class="value">-</span>
          </div>
          <div class="stat">
            <span class="label">帧率</span>
            <span id="fps" class="value">-</span>
          </div>
          <div class="stat">
            <span class="label">深度比例</span>
            <span id="depthScale" class="value">-</span>
          </div>
          <div class="stat">
            <span class="label">点击距离</span>
            <span id="depthAt" class="value">click image</span>
          </div>
          <div class="stat">
            <span class="label">错误</span>
            <span id="lastError" class="value error">none</span>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const cameraBadge = document.getElementById("cameraBadge");
    const cameraOk = document.getElementById("cameraOk");
    const resolution = document.getElementById("resolution");
    const fps = document.getElementById("fps");
    const depthScale = document.getElementById("depthScale");
    const depthAt = document.getElementById("depthAt");
    const lastError = document.getElementById("lastError");
    const resolutionSelect = document.getElementById("resolutionSelect");
    const fpsSelect = document.getElementById("fpsSelect");
    const applyConfigBtn = document.getElementById("applyConfigBtn");
    const singleView = document.getElementById("singleView");
    const splitView = document.getElementById("splitView");
    const stream = document.getElementById("stream");
    const colorStream = document.getElementById("colorStream");
    const depthStream = document.getElementById("depthStream");

    let currentMode = "color";
    let lastState = null;
    let configDirty = false;
    let applyInFlight = false;

    function renderState(state) {
      lastState = state;
      const ok = !!state.camera_ok;
      cameraBadge.textContent = ok ? "Camera: online" : "Camera: offline";
      cameraBadge.style.background = ok ? "rgba(6, 214, 160, 0.18)" : "rgba(239, 71, 111, 0.18)";
      cameraBadge.style.color = ok ? "#06d6a0" : "#ef476f";
      cameraOk.textContent = ok ? "online" : "offline";
      resolution.textContent = `${state.frame_width} x ${state.frame_height}`;
      fps.textContent = `${state.fps} fps`;
      depthScale.textContent = `${state.depth_scale_m?.toFixed?.(6) ?? state.depth_scale_m} m/unit`;
      lastError.textContent = state.last_error || "none";
      renderConfigSelectors(state);
    }

    function setMode(mode) {
      currentMode = mode;
      const depthSrc = "/stream_depth.mjpg";
      const colorSrc = "/stream.mjpg";
      singleView.style.display = mode === "split" ? "none" : "block";
      splitView.style.display = mode === "split" ? "grid" : "none";
      stream.src = mode === "depth" ? depthSrc : colorSrc;
      colorStream.src = colorSrc;
      depthStream.src = depthSrc;
      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.classList.toggle("active", button.dataset.mode === mode);
      });
    }

    function renderConfigSelectors(state) {
      if (!state?.options) return;
      if (!resolutionSelect.options.length) {
        state.options.resolutions.forEach((item) => {
          const option = document.createElement("option");
          option.value = `${item.width}x${item.height}`;
          option.textContent = item.label;
          resolutionSelect.appendChild(option);
        });
      }
      if (!fpsSelect.options.length) {
        state.options.fps_values.forEach((value) => {
          const option = document.createElement("option");
          option.value = `${value}`;
          option.textContent = `${value} fps`;
          fpsSelect.appendChild(option);
        });
      }
      if (configDirty || applyInFlight) {
        return;
      }
      resolutionSelect.value = `${state.config.color_width}x${state.config.color_height}`;
      fpsSelect.value = `${state.config.fps}`;
    }

    async function applyViewerConfig() {
      applyInFlight = true;
      applyConfigBtn.disabled = true;
      applyConfigBtn.textContent = "应用中...";
      const [width, height] = resolutionSelect.value.split("x").map(Number);
      const fpsValue = Number(fpsSelect.value);
      try {
        const response = await fetch("/api/config", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ width, height, fps: fpsValue }),
        });
        renderState(await response.json());
        configDirty = false;
        setMode(currentMode);
      } finally {
        applyInFlight = false;
        applyConfigBtn.disabled = false;
        applyConfigBtn.textContent = "应用参数";
      }
    }

    async function queryDepthAt(event) {
      const target = event.currentTarget;
      const rect = target.getBoundingClientRect();
      const naturalWidth = target.naturalWidth || target.clientWidth;
      const naturalHeight = target.naturalHeight || target.clientHeight;
      if (!naturalWidth || !naturalHeight) {
        return;
      }

      const scaleX = naturalWidth / rect.width;
      const scaleY = naturalHeight / rect.height;
      const x = Math.max(0, Math.min(naturalWidth - 1, Math.floor((event.clientX - rect.left) * scaleX)));
      const y = Math.max(0, Math.min(naturalHeight - 1, Math.floor((event.clientY - rect.top) * scaleY)));
      const response = await fetch(`/api/depth_at?x=${x}&y=${y}`);
      const payload = await response.json();
      if (payload.valid) {
        depthAt.textContent = `${payload.distance_m.toFixed(3)} m @ (${payload.x}, ${payload.y})`;
      } else {
        depthAt.textContent = payload.reason || "invalid";
      }
    }

    async function refreshState() {
      const response = await fetch("/api/state");
      renderState(await response.json());
    }

    function connectWebSocket() {
      const protocol = location.protocol === "https:" ? "wss" : "ws";
      const socket = new WebSocket(`${protocol}://${location.host}/ws`);
      socket.onmessage = (event) => {
        const message = JSON.parse(event.data);
        if (message.type === "state") {
          renderState(message.payload);
        }
      };
      socket.onclose = () => setTimeout(connectWebSocket, 1000);
    }

    refreshState().catch(console.error);
    connectWebSocket();
    stream.addEventListener("click", (event) => queryDepthAt(event).catch(console.error));
    colorStream.addEventListener("click", (event) => queryDepthAt(event).catch(console.error));
    depthStream.addEventListener("click", (event) => queryDepthAt(event).catch(console.error));
    resolutionSelect.addEventListener("change", () => { configDirty = true; });
    fpsSelect.addEventListener("change", () => { configDirty = true; });
  </script>
</body>
</html>
